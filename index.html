<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Rewriter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f4;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e5e4e0;
      padding: 32px;
      width: 100%;
      max-width: 600px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a18;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #737270;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #4a4a47;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      padding: 10px 12px;
      border: 1px solid #e5e4e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a18;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #a0a0f8; }

    .tone-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 16px 0 24px;
    }

    .tone-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #e5e4e0;
      background: #fff;
      color: #737270;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tone-btn:hover { border-color: #c0bfff; color: #4a4a47; }
    .tone-btn.active {
      background: #eeedfe;
      border-color: #afa9ec;
      color: #3c3489;
      font-weight: 500;
    }

    .submit-btn {
      width: 100%;
      padding: 10px;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-section { margin-top: 24px; }

    .output-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .copy-btn {
      font-size: 12px;
      color: #737270;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: #f0efec; color: #1a1a18; }

    .output-box {
      background: #f9f8f6;
      border: 1px solid #e5e4e0;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.7;
      color: #1a1a18;
      white-space: pre-wrap;
      min-height: 80px;
    }

    .error { color: #a32d2d; font-size: 13px; margin-top: 10px; }
    .meta { font-size: 12px; color: #a0a09a; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email rewriter</h1>
    <p class="subtitle">Paste a draft, pick a tone, get a polished version instantly.</p>

    <label for="email-input">Your draft</label>
    <textarea id="email-input" placeholder="e.g. hey can u send me the report asap its kinda urgent thx"></textarea>

    <label style="margin-top:16px;">Tone</label>
    <div class="tone-group" id="tone-group">
      <button class="tone-btn active" data-tone="Professional">Professional</button>
      <button class="tone-btn" data-tone="Friendly">Friendly</button>
      <button class="tone-btn" data-tone="Concise">Concise</button>
      <button class="tone-btn" data-tone="Formal">Formal</button>
      <button class="tone-btn" data-tone="Assertive">Assertive</button>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="rewrite()">Rewrite email</button>
    <p class="error" id="error"></p>

    <div class="output-section" id="output-section" style="display:none;">
      <div class="output-label">
        <label style="margin:0;">Rewritten email</label>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
      </div>
      <div class="output-box" id="output"></div>
      <p class="meta" id="meta"></p>
    </div>
  </div>

  <script>
    let selectedTone = "Professional";

    document.querySelectorAll(".tone-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tone-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        selectedTone = btn.dataset.tone;
      });
    });

    async function rewrite() {
      const email = document.getElementById("email-input").value.trim();
      const btn = document.getElementById("submit-btn");
      const errorEl = document.getElementById("error");
      errorEl.textContent = "";

      if (!email) { errorEl.textContent = "Please paste an email first."; return; }

      btn.disabled = true;
      btn.textContent = "Rewriting…";

      try {
        const res = await fetch("/api/rewrite", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, tone: selectedTone }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Unknown error");

        document.getElementById("output").textContent = data.result;
        document.getElementById("meta").textContent =
          `Tone: ${selectedTone} · ${data.result.split(" ").length} words`;
        document.getElementById("output-section").style.display = "block";
      } catch (err) {
        errorEl.textContent = err.message || "Something went wrong. Please try again.";
      }

      btn.disabled = false;
      btn.textContent = "Rewrite email";
    }

    function copyOutput() {
      navigator.clipboard.writeText(document.getElementById("output").textContent);
    }
  </script>
</body>
</html>
