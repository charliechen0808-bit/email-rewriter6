<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Rewriter</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 48px auto; padding: 0 16px; background: #f5f5f4; }
    .card { background: #fff; border-radius: 12px; padding: 32px; border: 1px solid #e5e4e0; }
    h1 { font-size: 20px; margin-bottom: 6px; }
    p { color: #737270; font-size: 14px; margin-bottom: 24px; }
    textarea { width: 100%; min-height: 120px; padding: 10px; border: 1px solid #e5e4e0; border-radius: 8px; font-size: 14px; font-family: inherit; box-sizing: border-box; }
    .tones { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0 24px; }
    button { padding: 6px 14px; border-radius: 6px; border: 1px solid #e5e4e0; background: #fff; font-size: 13px; cursor: pointer; }
    button.active { background: #eeedfe; border-color: #afa9ec; color: #3c3489; font-weight: 500; }
    #submit { width: 100%; padding: 10px; background: #1a1a18; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    #submit:disabled { opacity: 0.5; }
    #output-section { margin-top: 24px; display: none; }
    #output { background: #f9f8f6; border: 1px solid #e5e4e0; border-radius: 8px; padding: 14px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
    #error { color: #a32d2d; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email rewriter</h1>
    <p>Paste a draft, pick a tone, get a polished version instantly.</p>
    <textarea id="email" placeholder="e.g. hey can u send me the report asap thx"></textarea>
    <div class="tones">
      <button class="active" data-tone="Professional">Professional</button>
      <button data-tone="Friendly">Friendly</button>
      <button data-tone="Concise">Concise</button>
      <button data-tone="Formal">Formal</button>
      <button data-tone="Assertive">Assertive</button>
    </div>
    <button id="submit" onclick="rewrite()">Rewrite email</button>
    <p id="error"></p>
    <div id="output-section">
      <p style="font-weight:500; margin-bottom:6px;">Rewritten email</p>
      <div id="output"></div>
    </div>
  </div>
  <script>
    let tone = "Professional";
    document.querySelectorAll(".tones button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tones button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        tone = btn.dataset.tone;
      });
    });
    async function rewrite() {
      const email = document.getElementById("email").value.trim();
      const err = document.getElementById("error");
      err.textContent = "";
      if (!email) { err.textContent = "Please paste an email first."; return; }
      const btn = document.getElementById("submit");
      btn.disabled = true;
      btn.textContent = "Rewriting…";
      try {
        const res = await fetch("/api/rewrite", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, tone })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Unknown error");
        document.getElementById("output").textContent = data.result;
        document.getElementById("output-section").style.display = "block";
      } catch (e) {
        err.textContent = e.message;
      }
      btn.disabled = false;
      btn.textContent = "Rewrite email";
    }
  </script>
</body>
</html>
